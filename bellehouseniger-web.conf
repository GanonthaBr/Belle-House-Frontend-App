# =============================================================================
# Belle House Website (Frontend) - Nginx Virtual Host
# File: /etc/nginx/conf.d/bellehouseniger-web.conf
# =============================================================================
# Place this file on the VPS at: /etc/nginx/conf.d/bellehouseniger-web.conf
# Then run: nginx -t && nginx -s reload
# =============================================================================

server {
    listen 80;
    server_name bellehouseniger.com www.bellehouseniger.com;

    # Redirect www to non-www (optional, remove if not needed)
    if ($host = www.bellehouseniger.com) {
        return 301 http://bellehouseniger.com$request_uri;
    }

    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;

        # Cache static assets at proxy level
        proxy_cache_valid 200 1d;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8081/index.html;
        access_log off;
    }
}

